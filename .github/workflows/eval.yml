name: RAG Eval Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-quick:
    name: Quick eval (CI-safe, no GPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quick eval (mocked LLM)
        env:
          DOCMIND_SKIP_RERANKER: "1"
          CHROMA_DB_PATH: /tmp/chroma_test
        run: python -m eval.run_evals --quick --output eval_results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-quick
          path: eval_results.json

  eval-full:
    name: Full eval with auto-generated cases (Ollama)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Pull required models
        run: |
          ollama pull nomic-embed-text
          ollama pull tinyllama

      - name: Start DocMind backend
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Generate fixture PDF and ingest
        run: |
          pip install fpdf2 --quiet
          mkdir -p tests/fixtures
          python -c "
          from fpdf import FPDF
          pdf = FPDF()
          pdf.add_page()
          pdf.set_font('Helvetica', size=12)
          for line in [
            'DocMind Evaluation Sample Document',
            'The refund policy allows returns within 30 days of purchase.',
            'Customer support is available Monday to Friday, 9am to 5pm.',
            'All prices are listed in USD and subject to change without notice.',
            'The system uses a microservices architecture with AES-256 encryption.',
            'The API rate limit is 1000 requests per hour per user.',
            'Accounts inactive for 90 days are automatically deactivated.',
          ]:
            pdf.cell(0, 10, line, ln=True)
          pdf.output('tests/fixtures/sample.pdf')
          print('Fixture PDF created.')
          "
          curl -s -F "file=@tests/fixtures/sample.pdf" http://localhost:8000/upload
          sleep 2

      - name: Auto-generate eval cases from ingested docs
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: python -m eval.generate_cases --max-cases 10

      - name: Run full eval with LLM judge
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          python -m eval.run_evals \
            --full \
            --backend-url http://localhost:8000 \
            --commit ${{ github.sha }} \
            --output eval_results_full.json

      - name: Upload eval results + score history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-full
          path: |
            eval_results_full.json
            eval/scores_history.jsonl
