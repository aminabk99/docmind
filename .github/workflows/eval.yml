name: RAG Eval Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-quick:
    name: Quick eval (CI-safe, no GPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quick eval (mocked LLM)
        env:
          DOCMIND_SKIP_RERANKER: "1"
          CHROMA_DB_PATH: /tmp/chroma_test
        run: python -m eval.run_evals --quick --output eval_results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-quick
          path: eval_results.json

  eval-full:
    name: Full eval with auto-generated cases (Ollama)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Pull required models
        run: |
          ollama pull nomic-embed-text
          ollama pull qwen2.5:1.5b

      - name: Start M365Mind backend
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Load demo M365 policies
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          # Ingest the 17 sample governance policies (Conditional Access,
          # Named Locations, Sensitivity Labels) via the real /demo/load
          # endpoint, so the eval tests the actual M365 product path rather
          # than a generic document PDF.
          curl -s -X POST http://localhost:8000/demo/load
          sleep 2

      - name: Auto-generate eval cases from ingested docs
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: python -m eval.generate_cases --max-cases 10

      - name: Run full eval with LLM judge
        env:
          CHROMA_DB_PATH: /tmp/chroma_eval
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          python -m eval.run_evals \
            --full \
            --backend-url http://localhost:8000 \
            --commit ${{ github.sha }} \
            --output eval_results_full.json

      - name: Upload eval results + score history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-full
          path: |
            eval_results_full.json
            eval/scores_history.jsonl
